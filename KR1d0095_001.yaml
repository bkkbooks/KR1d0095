body:
  text: 廣林譙周五經然否曰小記曰庶子不為長子斬不繼祖與禰也此但別庶子而下言不繼祖謂庶子身不繼禰故其長子為不繼祖合而言之也難曰禮文三發二言繼祖一言連禰如但繼禰則應三年何緣須祖煩而失要合子於父舍徑就迂非事實也然則繼祖者必繼禰繼禰者必繼祖今連禰於祖以己繼之是繼祖者得三年繼禰者不得也至於連禰於祖以別高曾之祖故因禰以繼祖別嫌也通典卷八十七廟不始於周伊尹已言七代之廟矣成王六年制禮七廟亦已有見數文王為祖武王為禰祖非遠廟也周官宗廟而職曰宗祧周公不稱祖禰為遠祧也當須逆數成然後廟得別出不可於成王之代以文武逆云為遷主所藏矣通典卷四十七永和二年有司奏征西章郡潁川京兆四府君毀主藏處虞喜曰漢代韋元成等以毀主瘞於園魏朝議者云應埋兩階間且神主本在太廟若今別室而祭則不如永藏又四君無追號之禮益明應毀而祭通典卷四十八請瘞於廟兩階之間左氏說古者先王日祭於祖考月祀於高曾時享及二祧歲祫及壇墠終禘及郊宗石室但當時議所處石室未有准的喜請以夾室中通典卷五十睦譙王之弟兄俱封今求各立稱廟下太常議虞喜曰譙與中山俱始封之君父非諸侯尊同體敵無所為厭並立稱廟恩情兩伸荀議是也詔書所喻恐非禮意今上祭四代自以諸侯位尊得申其恩祭及四代不論毀且不毀為始封之君則譙王雖承父統稱廟亦應在毀之例不應長立也又安平獻王自為始封諸子雖別封而同為諸侯諸侯尊同故不復各立此則公子為諸侯不得立禰廟也而譙王父非諸侯使與諸侯同列不得並祭或難曰禮庶子不祭禰明其宗也若俱得祭父則並統二嫡非明其宗也答曰若宗子與庶子位俱為士禰已有廟無為重設與公子為諸侯不立禰廟同也若尊卑不同則己恩得施並祭無嫌也禮大夫三廟太祖百代不遷者也使大夫之後有庶統為諸侯者當上祭四代四代之前不得復祭若當奪尊則大夫太祖為廢其祀以此推之明得兼祭一者恩得伸隨代而毀一者繼太祖百代不替也徐禪曰愚等謂尊祖敬宗禮之所同若列國秩同則祭歸嫡子所以明宗也嫡輕庶重禮有兼享所以致孝也今譙王為長既享用重祿中山之祀無以加焉二國兩祭禮無所取詔書禁之是也詔稱安平獻王諸子並封不可各令立廟是荀暢之義矣然虞謂中山父非諸侯而祭更闕疑如禮意也虞徵士答衛軍軍虞喜以嫡為大夫庶為諸侯禮重應各立廟禪謂為克矣喜曰尊同體敵恩情兩申兄弟俱始為諸侯命數無降今士庶始封之君尚得上祭四代不拘於嫡以貴異之況己尊同五等更嫌不得其均用豐禮並祭四代所以寵之理非僭宗此蓋先王以孝理天下肅恭明祀之達意也昔周公有王功魯立文王之廟鄭有平王東遷之勳特令祖厲是為榮之非計享之祭在於周室魯鄭豈得過之哉通典卷五十一孔瑚問虞喜曰愚謂庶子不得如禮服其私親者以為身為宗主奉修祭祀以別尊卑故也凡婦服夫黨皆降一等唯公子厭至尊故其妻從輕而服重盡禮於皇姑則人情所許愚謂不得以公子為例喜答曰謂庶子為人後上繼祖禰此則厭於承重不得伸其私情故為所生服止緦麻其婦當依公子之妻盡禮皇姑從禮服重不繫於夫通典卷九十五漢初或云三老答天子拜遭王莽亂法度殘缺中興定禮儀群臣令三老答拜城門挍尉董鈞駮曰所以養三老以教事父母之道也若答拜是使天下答子拜也虞喜曰漢儀於門屏交禮交禮即答拜矣中興謬從鈞議後已革之甚得禮意通典卷六十七魏征東長史吳綱亡入吳妻子留在中國於吳再娶吳亡綱與後妻并子俱還並存虞喜議曰法有大妨禮無二嫡趙姬以君女之尊降身翟婦著在春秋此吳氏後妻所宜軌制通典卷六十八虞喜答魏顆云斬縗因喪之稱非為終三年也按禮為母喪縗四升而父喪既虞縗六升此為齊制不復斬也今代人既葬久後無改易唯小祥而變故緝在此月父母情等服俱三年父斬縗母緝縗以別尊卑斬止三月未為怪也女子出待既虞受以斬縗之受非更斬也通典卷八十七又答曰父為長子斬縗母為齊縗若不言其下恐母與父俱當斬縗所以別耳非謂明終斬之議耶同上或問曰喪服經傳為舊君仕焉而已者鄭注曰仕焉而已謂老若廢疾而致仕者也今致仕而廢疾理得同不喜正之曰廢疾沉淪罔同人伍不論臣道齊縗三月可也老而致仕臣禮既全恩紀無替自應三年不得三月傳言仕焉而已者謂既仕而去義同人伍耳通典卷卷八十九孔瑚問虞喜曰假使元孫為後元孫之婦從周曾孫之婦尚存才緦麻近輕遠重情實有疑虞喜答曰有嫡子者無嫡孫又若為宗子母服則不服宗子婦以此推之元孫為後若其母尚存元孫之服猶為庶不得傳重傳之服理當在姑矣通典卷九十六按賀循喪服記云父死未殯而祖父死服祖以周既殯而祖父死三年此謂嫡子為父後者也父未殯服祖以周者父尸尚在人子之義未可以代重也喜以為三禮無有此條殆是脫失親父正統非為旁親若父死未殯服祖但周則祖無倚廬傳重在誰假使祖為國君己為嫡孫祖沒己嗣此受封於祖祖之群臣服祖三年而己為嫡孫則服一周齌縗送葬斬杖無主雖云尸在未忍如大父何通典卷九十七
